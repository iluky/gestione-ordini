<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestione Ordini</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Ordine Merce</h1>
            <button onclick="caricaDati()" class="btn-sync">🔄 Sincronizza</button>
        </div>
        
        <div class="input-group">
            <input type="text" id="productInput" placeholder="Cosa manca?">
            <label class="btn-camera">
                📷 <input type="file" id="photoInput" accept="image/*" capture="environment" hidden>
            </label>
            <button onclick="aggiungiProdotto()" id="btnInvio" class="btn-add">Aggiungi</button>
        </div>

        <div id="preview-container" class="preview-box" style="display:none">
            <img id="photoPreview" src="">
            <button onclick="cancellaFoto()" class="btn-cancel">Elimina Foto</button>
        </div>

        <div id="main-content">
            <h3>🛒 Da Ordinare</h3>
            <div id="listaCategorie"><p class="status-msg">Inizializzazione...</p></div>

            <h3>🚚 In Arrivo</h3>
            <ul id="listaOrdinati"></ul>

            <button onclick="toggleArchivio()" class="btn-history">Mostra Storico Ricevuti</button>
            <div id="sezioneArchivio" style="display:none">
                <ul id="listaArchivio"></ul>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
