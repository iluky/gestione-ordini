<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestione Ordini Merce</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Ordine Merce</h1>
            <button onclick="caricaDati()" class="btn-icon">🔄</button>
        </div>
        
        <div class="input-section">
            <input type="text" id="productInput" placeholder="Cosa manca?">
            <label class="btn-photo">📷
                <input type="file" id="photoInput" accept="image/*" capture="environment" hidden>
            </label>
            <button onclick="aggiungiProdotto()" id="btnInvio">Aggiungi</button>
        </div>

        <div id="preview-container" class="preview-box" style="display:none">
            <img id="photoPreview" src="">
            <button onclick="cancellaFoto()">Annulla Foto</button>
        </div>

        <h3>Da Ordinare</h3>
        <div id="listaCategorie"><p>Caricamento...</p></div>

        <hr>
        <h3>In Arrivo</h3>
        <ul id="listaOrdinati"></ul>

        <button onclick="toggleArchivio()" class="btn-secondary">Mostra Storico</button>
        <div id="sezioneArchivio" style="display:none"><ul id="listaArchivio"></ul></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
